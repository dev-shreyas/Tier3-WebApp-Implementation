name: Flask App CI (Build, Dockerize, Scan, Publish)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - '**'
    paths:
      - "app/**"
      - "helm-charts/**"
      - ".github/workflows/continous-integration.yml"
      - '**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "helm-charts/**"
      - ".github/workflows/continous-integration.yml"
      - '**'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}      
  APP_NAME: flaskapp

jobs:
  build-and-push:
    name: Build . Dockerize . Publish
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}

    permissions:
      contents: write
      id-token: write

    outputs:
      build_tag: ${{ steps.vars.outputs.build_tag }}
      ecr_image: ${{ steps.ecr-push.outputs.image }}
      s3_artifact: ${{ steps.s3-upload.outputs.s3_path }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build variables
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_NUM="${GITHUB_RUN_NUMBER}"
          BUILD_TAG="build-${SHORT_SHA}-${BUILD_NUM}"
          ARTIFACT_NAME="${{ env.APP_NAME }}-${BUILD_TAG}.tar.gz"

          echo "build_num=${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

          echo "### Build identifiers" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"       >> $GITHUB_STEP_SUMMARY
          echo "|-|-|"                 >> $GITHUB_STEP_SUMMARY
          echo "| Build number | \`${BUILD_NUM}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA      | \`${SHORT_SHA}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Image tag    | \`${BUILD_TAG}\`  |"  >> $GITHUB_STEP_SUMMARY          


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies

        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb-short 2>/dev/null || (echo "No tests found, skipping...")

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
 
          if [ -z "$CHANGES" ]; then
            CHANGES="- No new commits since last release"
          fi
 
          # Write to file so special chars survive GITHUB_OUTPUT
          echo "$CHANGES" > /tmp/changelog.txt
          echo "changelog_file=/tmp/changelog.txt" >> $GITHUB_OUTPUT
          echo "last_tag=${LAST_TAG}"              >> $GITHUB_OUTPUT
 
          echo ""
          echo "=== Changelog ==="
          cat /tmp/changelog.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} #arn:aws:iam::881953412430:role/github-terraform-role
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: ecr-login
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr-registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT

      - name: Check if Image Exists in ECR
        if: github.ref == 'refs/heads/main'
        id: check-image
        run: |
          if aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --image-ids imageTag=${{ steps.vars.outputs.build_tag }} > /dev/null 2>&1; then
            echo "Image already exists in ECR. Skipping build and push."
            echo "image-exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist in ECR. Proceeding with build and push."
            echo "image-exists=false" >> $GITHUB_OUTPUT
          fi      

      - name: Build Docker Image
        id: docker-build
        if: github.ref != 'refs/heads/main' || steps.check-image.outputs.image-exists == 'false'
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.ecr-registry }}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}"

          docker build \
            --build-arg BUILD_NUMBER="${{ steps.vars.outputs.build_num }}" \
            --build-arg GIT_SHA="${{ steps.vars.outputs.short_sha }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "build.number=${{ steps.vars.outputs.build_num }}" \
            --label deployment.strategy=blue-green \
            -t "${IMAGE_URI}:${BUILD_TAG}" \
            -t "${IMAGE_URI}:latest" \
            -f Dockerfile \
            .
 
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.docker-build.outputs.image_uri }}:${{ steps.vars.outputs.build_tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master  
        with: 
          image-ref: ${{ steps.docker-build.outputs.image_uri }}:${{ steps.vars.outputs.build_tag }}
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.vars.outputs.build_tag }}
          path: sbom.json
          retention-days: 30
        
      - name: Push Docker Image to ECR
        id: ecr-push
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          IMAGE_URI="${{ steps.docker-build.outputs.image_uri }}"
 
          docker push "${IMAGE_URI}:${BUILD_TAG}"
          docker push "${IMAGE_URI}:latest"
 
          FULL_IMAGE="${IMAGE_URI}:${BUILD_TAG}"
          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "**ECR image:** \`${FULL_IMAGE}\`" >> $GITHUB_STEP_SUMMARY

      - name: Create release artifact package
        if: github.ref != 'refs/heads/main' || steps.check-image.outputs.image-exists == 'false'  
        id: package
        run: |
          ARTIFACT_NAME="${{ steps.vars.outputs.artifact_name }}"
          ARTIFACT_DIR="/tmp/${ARTIFACT_NAME}"
          mkdir -p "${ARTIFACT_DIR}"
 
          # Copy application source
          cp -r \
            app.py \
            requirements.txt \
            Dockerfile \
            templates/ \
            static/ \
            "${ARTIFACT_DIR}/"
 
          # Changelog
          cp "${{ steps.changelog.outputs.changelog_file }}" "${ARTIFACT_DIR}/CHANGELOG.md"
 
          # Build manifest (JSON)
          cat > "${ARTIFACT_DIR}/manifest.json" <<EOF
          {
            "artifact_name": "${{ steps.vars.outputs.artifact_name }}",
            "artifact_file": "${{ steps.vars.outputs.artifact_name }}.tar.gz",
            "s3_key": "builds/${{ steps.vars.outputs.build_num }}/${{ steps.vars.outputs.artifact_name }}.tar.gz",

            "name":         "${{ env.APP_NAME }}",
            "version":      "${{ steps.vars.outputs.build_tag }}",
            "build_number": "${{ steps.vars.outputs.build_num }}",
            "git_sha":      "${{ github.sha }}",
            "git_ref":      "${{ github.ref_name }}",
            "built_at":     "$(date -u +%Y-%m-%dT%H:%M:%SZ)",

            "ecr_image":    "${{ steps.docker-build.outputs.image_uri }}:${{ steps.vars.outputs.build_tag }}",
            "repository":   "${{ github.repository }}"
          }
          EOF
 
          # Create tarball
          TARBALL="/tmp/${ARTIFACT_NAME}.tar.gz"
          tar -czf "${TARBALL}" -C /tmp "${ARTIFACT_NAME}"
 
          echo "tarball=${TARBALL}"           >> $GITHUB_OUTPUT
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "Artifact size: $(du -sh ${TARBALL} | cut -f1)"

      - name: Upload artifact to S3
        id: s3-upload
        run: |
          BUILD_NUM="${{ steps.vars.outputs.build_num }}"
          ARTIFACT_NAME="${{ steps.vars.outputs.artifact_name }}"
          TARBALL="${{ steps.package.outputs.tarball }}"
          S3_PREFIX="builds/${BUILD_NUM}"
 
          # Upload tarball
          aws s3 cp "${TARBALL}" \
            "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/${ARTIFACT_NAME}.tar.gz" \
            --metadata "build-number=${BUILD_NUM},git-sha=${{ github.sha }}"
 
          # Upload manifest separately (easy machine-readable lookup)
          aws s3 cp "/tmp/${ARTIFACT_NAME}/manifest.json" \
            "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/manifest.json"
 
          # Upload changelog
          aws s3 cp "/tmp/changelog.txt" \
            "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/CHANGELOG.md"
 
          # Update a "latest" pointer file
          echo "${S3_PREFIX}/${ARTIFACT_NAME}.tar.gz" | \
            aws s3 cp - "s3://${{ env.S3_BUCKET }}/latest.txt"
 
          S3_PATH="s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/${ARTIFACT_NAME}.tar.gz"
          echo "s3_path=${S3_PATH}" >> $GITHUB_OUTPUT
          echo "**S3 artifact:** \`${S3_PATH}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: ${{ steps.package.outputs.tarball }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.build_tag }}
          name: "Release ${{ steps.vars.outputs.build_tag }}"
          body_path: ${{ steps.changelog.outputs.changelog_file }}
          files: ${{ steps.package.outputs.tarball }}
          make_latest: true
          
      - name: Post job summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/changelog.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
