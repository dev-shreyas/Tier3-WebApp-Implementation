<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
        }
        .dark-mode-toggle-auth {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .dark-mode-toggle-auth:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        html.dark-mode .auth-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        html.dark-mode .auth-card {
            background-color: #2d2d2d !important;
            color: #f3f4f6;
        }
        html.dark-mode .form-control {
            background-color: #3a3a3a;
            border-color: #4a4a4a;
            color: #f3f4f6;
        }
        html.dark-mode .form-control:focus {
            background-color: #3a3a3a;
            border-color: #6366f1;
            color: #f3f4f6;
        }
        html.dark-mode .form-label {
            color: #f3f4f6;
        }
        html.dark-mode a {
            color: #6366f1;
        }
        html.dark-mode a:hover {
            color: #8b5cf6;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card bg-white p-5">
            <button class="dark-mode-toggle-auth" title="Toggle dark mode">
                <i class="bi bi-moon"></i>
            </button>
            <div class="text-center mb-4">
                <div style="font-size: 3rem; color: #667eea;">
                    <i class="bi bi-lightning-charge"></i>
                </div>
                <h1 class="h3 fw-bold mt-3">Task Manager Pro</h1>
                <p class="text-muted">Manage tasks efficiently</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                            <i class="bi bi-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }}"></i>
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="mt-4">
                <div class="mb-4">
                    <label for="username" class="form-label fw-bold">Username</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                        <input 
                            type="text" 
                            class="form-control form-control-lg bg-light border-0" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username"
                            required
                            autofocus
                        >
                    </div>
                    <small class="text-muted">Demo: <strong>demo</strong></small>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                        <input 
                            type="password" 
                            class="form-control form-control-lg bg-light border-0" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    <small class="text-muted">Demo: <strong>demo</strong></small>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center text-muted mb-3">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-primary">Register here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dark mode for auth pages
        const darkModeToggleAuth = {
            init() {
                this.loadPreference();
                this.setupToggleButton();
            },
            
            loadPreference() {
                const savedMode = localStorage.getItem('darkMode');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDarkMode = savedMode ? JSON.parse(savedMode) : prefersDark;
                
                if (isDarkMode) {
                    this.enable();
                }
            },
            
            setupToggleButton() {
                const toggle = document.querySelector('.dark-mode-toggle-auth');
                if (toggle) {
                    toggle.addEventListener('click', () => {
                        const isDarkMode = document.documentElement.classList.contains('dark-mode');
                        isDarkMode ? this.disable() : this.enable();
                    });
                }
            },
            
            enable() {
                document.documentElement.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'true');
                this.updateToggleIcon();
            },
            
            disable() {
                document.documentElement.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'false');
                this.updateToggleIcon();
            },
            
            updateToggleIcon() {
                const toggle = document.querySelector('.dark-mode-toggle-auth');
                if (toggle) {
                    const icon = toggle.querySelector('i');
                    const isDarkMode = document.documentElement.classList.contains('dark-mode');
                    if (icon) {
                        icon.className = isDarkMode ? 'bi bi-brightness-high' : 'bi bi-moon';
                    }
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            darkModeToggleAuth.init();
        });
    </script>
</body>
</html>
